name: Validate index.json

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate index.json matches area directories
        run: |
          errors=0

          # Get all area directories (directories containing data.json)
          for data_file in */data.json; do
            [ -f "$data_file" ] || continue
            slug="$(dirname "$data_file")"

            # Check area exists in index.json
            entry=$(jq -r --arg s "$slug" '.[] | select(.slug == $s)' index.json)
            if [ -z "$entry" ]; then
              echo "::error::Area directory '$slug' has no entry in index.json"
              errors=$((errors + 1))
              continue
            fi

            # Compare boulderCount
            actual_count=$(jq '.boulders | length' "$data_file")
            index_count=$(jq -r --arg s "$slug" '.[] | select(.slug == $s) | .boulderCount' index.json)
            if [ "$actual_count" != "$index_count" ]; then
              echo "::error::boulderCount mismatch for '$slug': index.json has $index_count, data.json has $actual_count boulders"
              errors=$((errors + 1))
            fi

            # Compare name
            actual_name=$(jq -r '.name' "$data_file")
            index_name=$(jq -r --arg s "$slug" '.[] | select(.slug == $s) | .name' index.json)
            if [ "$actual_name" != "$index_name" ]; then
              echo "::error::name mismatch for '$slug': index.json has '$index_name', data.json has '$actual_name'"
              errors=$((errors + 1))
            fi

            # Compare country
            actual_country=$(jq -r '.country' "$data_file")
            index_country=$(jq -r --arg s "$slug" '.[] | select(.slug == $s) | .country' index.json)
            if [ "$actual_country" != "$index_country" ]; then
              echo "::error::country mismatch for '$slug': index.json has '$index_country', data.json has '$actual_country'"
              errors=$((errors + 1))
            fi

            # Compare city
            actual_city=$(jq -r '.city' "$data_file")
            index_city=$(jq -r --arg s "$slug" '.[] | select(.slug == $s) | .city' index.json)
            if [ "$actual_city" != "$index_city" ]; then
              echo "::error::city mismatch for '$slug': index.json has '$index_city', data.json has '$actual_city'"
              errors=$((errors + 1))
            fi

            # Compare type
            actual_type=$(jq -r '.type' "$data_file")
            index_type=$(jq -r --arg s "$slug" '.[] | select(.slug == $s) | .type' index.json)
            if [ "$actual_type" != "$index_type" ]; then
              echo "::error::type mismatch for '$slug': index.json has '$index_type', data.json has '$actual_type'"
              errors=$((errors + 1))
            fi

            # Check version exists and is a positive integer
            version=$(jq -r --arg s "$slug" '.[] | select(.slug == $s) | .version' index.json)
            if [ -z "$version" ] || [ "$version" = "null" ]; then
              echo "::error::Missing 'version' for '$slug' in index.json"
              errors=$((errors + 1))
            elif ! echo "$version" | grep -qE '^[1-9][0-9]*$'; then
              echo "::error::Invalid 'version' for '$slug': must be a positive integer, got '$version'"
              errors=$((errors + 1))
            fi

            echo "✓ $slug — OK"
          done

          # Check for orphan entries in index.json (slug with no directory)
          for slug in $(jq -r '.[].slug' index.json); do
            if [ ! -f "$slug/data.json" ]; then
              echo "::error::index.json has entry '$slug' but no '$slug/data.json' exists"
              errors=$((errors + 1))
            fi
          done

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "Found $errors error(s). Please update index.json to match your area data."
            exit 1
          fi

          echo ""
          echo "All areas validated successfully."

      - name: Validate version bump for changed areas
        run: |
          errors=0
          base_ref="${{ github.event.pull_request.base.sha }}"

          # Get list of changed files compared to base
          changed_files=$(git diff --name-only "$base_ref"...HEAD)

          # Collect slugs of areas that have changes (files inside area directories)
          changed_slugs=()
          for file in $changed_files; do
            # Skip files not inside an area directory (e.g. root-level files)
            [[ "$file" == */* ]] || continue
            slug="${file%%/*}"
            # Only consider it an area if it has a data.json
            [ -f "$slug/data.json" ] || continue
            # Deduplicate
            if [[ ! " ${changed_slugs[*]} " =~ " ${slug} " ]]; then
              changed_slugs+=("$slug")
            fi
          done

          for slug in "${changed_slugs[@]}"; do
            # Get current version from PR branch
            current_version=$(jq -r --arg s "$slug" '.[] | select(.slug == $s) | .version' index.json)

            # Get base version from base branch
            base_version=$(git show "$base_ref":index.json | jq -r --arg s "$slug" '.[] | select(.slug == $s) | .version // 0')

            if [ "$base_version" = "null" ] || [ -z "$base_version" ]; then
              base_version=0
            fi

            expected_version=$((base_version + 1))

            if [ "$current_version" != "$expected_version" ]; then
              echo "::error::Area '$slug' has changes but version was not bumped correctly. Expected version $expected_version (was $base_version), got $current_version"
              errors=$((errors + 1))
            else
              echo "✓ $slug — version bumped $base_version → $current_version"
            fi
          done

          if [ "${#changed_slugs[@]}" -eq 0 ]; then
            echo "No area directories were changed."
          fi

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "Found $errors error(s). Please bump the 'version' field in index.json by 1 for each changed area."
            exit 1
          fi

          echo ""
          echo "All version bumps validated successfully."

      - name: Validate image file sizes (max 100KB)
        run: |
          max_bytes=102400
          errors=0

          while IFS= read -r img; do
            size=$(stat --format="%s" "$img")
            if [ "$size" -gt "$max_bytes" ]; then
              size_kb=$(( (size + 1023) / 1024 ))
              echo "::error::Image '$img' is ${size_kb}KB, exceeds 100KB limit"
              errors=$((errors + 1))
            fi
          done < <(find . -path '*/images/*' -type f ! -path './.git/*')

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "Found $errors image(s) exceeding the 100KB size limit."
            exit 1
          fi

          echo "All images are within the 100KB size limit."

      - name: Validate images are JPG format
        run: |
          errors=0

          # Check for non-JPG files in images directories
          while IFS= read -r img; do
            ext="${img##*.}"
            ext_lower=$(echo "$ext" | tr '[:upper:]' '[:lower:]')
            if [ "$ext_lower" != "jpg" ] && [ "$ext_lower" != "jpeg" ]; then
              echo "::error::Image '$img' is not a JPG file. Only .jpg/.jpeg images are allowed."
              errors=$((errors + 1))
            fi
          done < <(find . -path '*/images/*' -type f ! -path './.git/*')

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "Found $errors non-JPG image(s). Please convert them to JPG format."
            exit 1
          fi

          echo "All images are in JPG format."
